<!DOCTYPE html>
<html lang="id">
<head>
    <title>Demo SurveyJS - Profil Responden</title>
    <!-- SurveyJS Dependencies -->
    <script src="https://unpkg.com/knockout/build/output/knockout-latest.js"></script>
    
    <!-- SurveyJS Core -->
    <link href="https://unpkg.com/survey-core/defaultV2.min.css" type="text/css" rel="stylesheet">
    <script src="https://unpkg.com/survey-core/survey.core.min.js"></script>
    <script src="https://unpkg.com/survey-knockout-ui/survey-knockout-ui.min.js"></script>

    <!-- SurveyJS Creator -->
    <link href="https://unpkg.com/survey-creator-core/survey-creator-core.min.css" type="text/css" rel="stylesheet">
    <script src="https://unpkg.com/survey-creator-core/survey-creator-core.min.js"></script>
    <script src="https://unpkg.com/survey-creator-knockout/survey-creator-knockout.min.js"></script>

    <!-- Translations -->
    <script src="https://unpkg.com/survey-core/survey.i18n.min.js"></script>
    <script src="https://unpkg.com/survey-creator-core/survey-creator-core.i18n.min.js"></script>
</head>
<body>
    <div id="creatorElement" style="height: 100vh;"></div>
    <script>
        console.log("Type of ko:", typeof ko);
        console.log("Type of Survey:", typeof Survey);
        console.log("Type of SurveyCreator:", typeof SurveyCreator);
        
        try {
            const options = { showLogicTab: true };
            const CreatorClass = typeof SurveyCreator.SurveyCreator !== 'undefined' ? SurveyCreator.SurveyCreator : SurveyCreator;
            const creator = new CreatorClass(options);
            creator.render("creatorElement");
            console.log("Successfully rendered!");
        } catch(e) {
            console.error("Failed to render:", e);
        }
    </script>
</body>
</html>
